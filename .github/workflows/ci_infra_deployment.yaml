name: Deploy CI

on:
  push:
    branches:
      - master
env:
  dockerFileLocation: "./Dockerfile" # where is your dockerfile
  serviceName: "klar-assets"

jobs:
  build:
    name: Build docker image
    environment: klar-infra-neutral
    runs-on: [klarmx-4-4gi-4gi]
    outputs:
      imageTag: ${{ steps.docker.outputs.imageTag }}
    steps:
      - uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: '${{ secrets.ORG_SSH_KEY }}'
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Check Dockerfile
        id: check_file_changed
        run: |
          $(diff=$(git diff --name-only HEAD^ HEAD | grep -E "^Dockerfile$")
          has_diff=false
          if [ -n "$diff" ]; then
            has_diff=true
          fi
          echo "dockerfile_changed=$has_diff" >> $GITHUB_OUTPUT) || true
      - name: Build Docker image
        id: docker_build
        if: steps.check_file_changed.outputs.dockerfile_changed == 'True'
        run: |
          repoPath="739282534308.dkr.ecr.us-east-2.amazonaws.com/klar-assets" 
          imageTag="${repoPath}:latest"
          docker build -f "${dockerFileLocation}" -t "${imageTag}" .
          docker push "${imageTag}"  


  deploy:
    name: Deploy neutral jobs (Terragrunt)
    needs: build
    concurrency:
      group: terraform-neutral-jobs
    runs-on: klarmx-default
    steps:
      - run: |
          tfenv install 1.9.8
          tfenv use 1.9.8
          terraform --version
          # Terragrunt parses `terraform version`; tfenv's shim can prepend colored install logs and break parsing.
          echo "TERRAGRUNT_TFPATH=$HOME/.tfenv/versions/1.9.8/terraform" >> $GITHUB_ENV
      - uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: '${{ secrets.ORG_SSH_KEY }}'
      - uses: actions/checkout@v2
      - name: Set up Python (for lambda-layers pip install in Terragrunt)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: klar-mx/github-actions/deploy_infra@main
        with:
          environment: 'klar-infra-neutral'
          image: "${{ needs.build.outputs.ecr }}/${{ needs.build.outputs.repository }}:${{ needs.build.outputs.imageTag }}"
          secrets: ${{ toJSON(secrets) }}