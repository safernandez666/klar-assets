services:
  app:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    ports:
      - "${DOCKER_PORT:-9090}:8080"
    env_file:
      - .env
    volumes:
      - klar-data:/app/data
    restart: unless-stopped

volumes:
  klar-data:
