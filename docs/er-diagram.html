.diagram-wrap { overflow-x: auto; }

/* SVG text styles */
.tbl-name     { font-family: 'DM Sans', sans-serif; font-size: 12.5px; font-weight: 700; fill: #fff; letter-spacing: 0.03em; }

.f-fk         { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; fill: #3b82f6; }
.rel-lbl      { font-family: 'JetBrains Mono', monospace; font-size: 8px; fill: #4f5d75; letter-spacing: 0.05em; }
.leg-lbl      { font-family: 'DM Sans', sans-serif; font-size: 11px; fill: #4f5d75; }
</style>
</head>

<!--
  LAYOUT MATH  (row height R=26, header H=48, sep line at H+0)
  ──────────────────────────────────────────────────────────────
  devices (19 fields):   y0=40  h = H + 19*R + 4 = 48+494+4 = 546   bottom=586
  sync_runs (9 fields):  y0=40  h = H + 9*R  + 4 = 48+234+4 = 286   bottom=326
  status_snapshots(12):  y0=346 h = H + 12*R + 4 = 48+312+4 = 364   bottom=710
  acknowledged(4 fields):y0=610 h = H + 4*R  + 4 = 48+104+4 = 156   bottom=766

  Column A (devices + acknowledged):  x=40,  right=370
  Column B (sync_runs + status_snap): x=700, right=980

  Connector gap between cols: x=400..680

  FK line (status_snapshots → sync_runs): route via x=686
    leaves status_snapshots left at (700, 414) → sync_run_id row midpoint
    arrives sync_runs left at (700, 188) → id row midpoint (y0+48+R/2+R*0+R/2)
    Actually: sync_runs id row text y=107+13=top of first field area
    We use field midpoints: firstfield_mid = y0+H+R/2

  Logical ref (acknowledged.canonical_id → devices.canonical_id):
    leaves acknowledged right at (370, 649) → canonical_id row midpoint
    arrives devices right at (370, 153) → canonical_id row midpoint
    routes via x=392
-->
