<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klar Device Normalizer — Sync Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f5f5f3;
  --paper-2: #ececea;
  --ink: #0f0f0f;
  --muted: #4f5d75;
  --soft: #7a8399;
  --rule: rgba(15,15,15,0.10);
  --red: #dc2626;
  --red-tint: #fef2f2;
  --blue: #2563eb;
  --blue-tint: #eff6ff;
  --amber: #d97706;
  --amber-tint: #fffbeb;
  --violet: #7c3aed;
  --violet-tint: #f5f3ff;
  --green: #059669;
  --green-tint: #ecfdf5;
  --ink-tint: rgba(15,15,15,0.04);
  --ink-border: rgba(15,15,15,0.14);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: var(--paper); }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 52px 40px 72px;
}
header {
  max-width: 900px;
  margin: 0 auto 48px;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 24px;
}
h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 2rem;
  font-weight: 400;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.subtitle {
  font-size: 13px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.02em;
}
.chart-wrap {
  max-width: 900px;
  margin: 0 auto;
  overflow-x: auto;
}
svg {
  display: block;
  margin: 0 auto;
  overflow: visible;
}

/* SVG text styles */
.label-main {
  font-family: 'DM Sans', sans-serif;
  font-size: 11.5px;
  font-weight: 600;
  fill: var(--ink);
}
.label-mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  font-weight: 400;
  fill: var(--soft);
}
.label-zone {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  fill: var(--soft);
}
.label-arrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5px;
  fill: var(--muted);
  letter-spacing: 0.04em;
}
.label-diamond {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 600;
  fill: var(--ink);
}
.label-serif {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 11px;
  fill: var(--muted);
}
</style>
</head>
<body>

<header>
  <h1>Klar Device Normalizer <em style="font-style:italic;font-family:'Instrument Serif',serif;font-weight:400;color:var(--muted);font-size:1.6rem">— Sync Flow</em></h1>
  <p class="subtitle">sync_devices() · full pipeline from trigger to cache refresh</p>
</header>

<div class="chart-wrap">
<!--
  Canvas: 860 wide × 1760 tall
  Layout columns (x-centers):
    Left source:  180
    Center:       430
    Right source: 680
  Main flow center: 430
-->
<svg width="860" height="1760" viewBox="0 0 860 1760" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Arrow markers -->
  <marker id="arrow-ink" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#0f0f0f" opacity="0.55"/>
  </marker>
  <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#dc2626" opacity="0.7"/>
  </marker>
  <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#2563eb" opacity="0.7"/>
  </marker>
  <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#d97706" opacity="0.7"/>
  </marker>
  <marker id="arrow-violet" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed" opacity="0.7"/>
  </marker>
  <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#059669" opacity="0.7"/>
  </marker>
</defs>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- STEP 1: TRIGGER -->
<!-- ═══════════════════════════════════════════════════════ -->

<!-- Trigger node (rounded rect, slightly heavy border) -->
<rect x="300" y="32" width="260" height="56" rx="8"

<!-- small scheduler icon bar -->
<rect x="300" y="32" width="260" height="8" rx="8" fill="#0f0f0f" opacity="0.08"/>
<text x="430" y="62" text-anchor="middle" class="label-main">Scheduler / Manual Trigger</text>
<text x="430" y="76" text-anchor="middle" class="label-mono">cron · sync_devices()</text>

<!-- Arrow down -->
<line x1="430" y1="88" x2="430" y2="112" stroke="#0f0f0f" stroke-width="1.4" stroke-opacity="0.4" marker-end="url(#arrow-ink)"/>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- PARALLEL COLLECT ZONE -->
<!-- ═══════════════════════════════════════════════════════ -->

<!-- Zone bracket -->

<rect x="42" y="108" width="130" height="16" fill="#f5f5f3"/>
<text x="48" y="120" class="label-zone">Parallel Collection</text>

<line x1="430" y1="148" x2="430" y2="172" stroke="#2563eb" stroke-width="1.4" stroke-opacity="0.5" marker-end="url(#arrow-blue)"/>
<line x1="680" y1="148" x2="680" y2="172" stroke="#d97706" stroke-width="1.4" stroke-opacity="0.5" marker-end="url(#arrow-amber)"/>

<!-- CrowdStrike -->
<rect x="80" y="176" width="200" height="56" rx="6"
      fill="#fef2f2" stroke="#dc2626" stroke-width="1.4"/>
<text x="180" y="202" text-anchor="middle" class="label-main" fill="#dc2626">CrowdStrike</text>
<text x="180" y="217" text-anchor="middle" class="label-mono">EDR · Falconpy SDK</text>

<!-- JumpCloud -->
<rect x="330" y="176" width="200" height="56" rx="6"

<text x="430" y="202" text-anchor="middle" class="label-main" fill="#2563eb">JumpCloud</text>

<text x="680" y="217" text-anchor="middle" class="label-mono">IDP · SCIM / REST API</text>

<!-- Collect arrows converging to center bus at y=278 -->
<line x1="180" y1="232" x2="180" y2="266" stroke="#dc2626" stroke-width="1.4" stroke-opacity="0.4"/>
<line x1="430" y1="232" x2="430" y2="266" stroke="#2563eb" stroke-width="1.4" stroke-opacity="0.4"/>
<line x1="680" y1="232" x2="680" y2="266" stroke="#d97706" stroke-width="1.4" stroke-opacity="0.4"/>
<!-- Horizontal merge bus -->
<line x1="180" y1="266" x2="680" y2="266" stroke="#0f0f0f" stroke-width="1.2" stroke-opacity="0.18"/>
<!-- Center drop to next step -->
<line x1="430" y1="266" x2="430" y2="290" stroke="#0f0f0f" stroke-width="1.4" stroke-opacity="0.4" marker-end="url(#arrow-ink)"/>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- STEP 2: FILTER MOBILE -->

<!-- ═══════════════════════════════════════════════════════ -->
<!-- DEDUP ZONE -->

<rect x="140" y="400" width="580" height="210" rx="8"

<line x1="430" y1="536" x2="430" y2="556" stroke="#0f0f0f" stroke-width="1.3" stroke-opacity="0.35" marker-end="url(#arrow-ink)"/>

<!-- Dedup pass 3: hostname -->
<rect x="300" y="560" width="260" height="52" rx="6"

<text x="430" y="854" text-anchor="middle" class="label-main" fill="#7c3aed">AI Matcher</text>
<text x="430" y="869" text-anchor="middle" class="label-mono">OpenAI · structured output</text>
