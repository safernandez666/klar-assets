<style>
:root {
  --paper: #f5f5f3;
  --paper-2: #ececea;
  --ink: #0f0f0f;
  --muted: #4f5d75;
  --soft: #7a8399;
  --rule: rgba(15,15,15,0.10);
  --red: #dc2626;
  --red-tint: #fef2f2;
  --blue: #2563eb;
  --blue-tint: #eff6ff;
  --amber: #d97706;
  --amber-tint: #fffbeb;
  --violet: #7c3aed;
  --violet-tint: #f5f3ff;
  --green: #059669;
  --green-tint: #ecfdf5;
  --ink-tint: rgba(15,15,15,0.04);
  --ink-border: rgba(15,15,15,0.14);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: var(--paper); }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 52px 40px 72px;
}
header {
  max-width: 900px;
  margin: 0 auto 48px;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 24px;
}
h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 2rem;
  font-weight: 400;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.subtitle {
  font-size: 13px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.02em;
}
.chart-wrap {
  max-width: 900px;
  margin: 0 auto;
  overflow-x: auto;
}
svg {
  display: block;
  margin: 0 auto;
  overflow: visible;
}

/* SVG text styles */
.label-main {
  font-family: 'DM Sans', sans-serif;
  font-size: 11.5px;
  font-weight: 600;
  fill: var(--ink);
}
.label-mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  font-weight: 400;
  fill: var(--soft);
}
.label-zone {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  fill: var(--soft);
}
.label-arrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5px;
  fill: var(--muted);
  letter-spacing: 0.04em;
}
.label-diamond {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 600;
  fill: var(--ink);
}
.label-serif {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 11px;
  fill: var(--muted);
}
</style>
</head>
