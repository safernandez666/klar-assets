apiVersion: v1
kind: ConfigMap
metadata:
  name: dn-config
  namespace: device-normalizer
data:
  CS_BASE_URL: "https://api.us-2.crowdstrike.com"
  OKTA_DOMAIN: "example.okta.com"
  APP_URL: "https://devices.example.com"
  AUTH_USERNAME: "admin"
  SYNC_INTERVAL_HOURS: "6"
  SYNC_ON_STARTUP: "true"
  WEB_HOST: "0.0.0.0"
  WEB_PORT: "8080"
  DB_PATH: "/data/devices.db"
