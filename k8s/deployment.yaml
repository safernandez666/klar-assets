apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-normalizer
  namespace: device-normalizer
  labels:
    app: device-normalizer
spec:
  replicas: 1
  strategy:
    type: Recreate  # SQLite doesn't support concurrent writers
  selector:
    matchLabels:
      app: device-normalizer
  template:
    metadata:
      labels:
        app: device-normalizer
    spec:
      containers:
        - name: app
          image: device-normalizer:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: dn-config
            - secretRef:
                name: dn-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dn-data
