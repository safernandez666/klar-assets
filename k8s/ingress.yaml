apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: device-normalizer
  namespace: device-normalizer
  annotations:
    # Uncomment for cert-manager TLS
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: devices.example.com  # Change to your FQDN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: device-normalizer
                port:
                  number: 80
  # Uncomment for TLS
  # tls:
  #   - hosts:
  #       - devices.example.com
  #     secretName: dn-tls
