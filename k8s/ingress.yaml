apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: klar-device-normalizer
  namespace: klar
  annotations:
    # Uncomment for cert-manager TLS
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: devices.klar.mx  # Change to your FQDN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: klar-device-normalizer
                port:
                  number: 80
  # Uncomment for TLS
  # tls:
  #   - hosts:
  #       - devices.klar.mx
  #     secretName: klar-tls
